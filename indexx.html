<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Tetris - Red Background</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        .game-container {
            text-align: center;
            background: #111;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px #00f; /* Blue glow */
        }
        canvas {
            border: 3px solid #00f; /* Blue border */
            background: #8B0000; /* Dark red background */
            box-shadow: 0 0 30px #00f;
            margin: 10px 0;
        }
        .info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 10px 0;
            font-size: 18px;
            font-weight: bold;
            color: #00f; /* Blue text */
        }
        .controls {
            margin: 15px 0;
            font-size: 14px;
            line-height: 1.6;
            color: #00f; /* Blue text */
        }
        h1 {
            margin: 0 0 20px 0;
            text-shadow: 0 0 10px #00f;
            font-size: 28px;
            color: #00f;
        }
        button {
            background: #00f; /* Blue buttons */
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #66f;
            box-shadow: 0 0 15px #00f;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🔵 BLUE TETRIS</h1>
        <div class="info">
            <div>Score: <span id="score">0</span></div>
            <div>Level: <span id="level">1</span></div>
            <div>Lines: <span id="lines">0</span></div>
        </div>
        <canvas id="game" width="300" height="600"></canvas>
        <div>Next: <canvas id="next" width="120" height="120" style="background: #8B0000; border: 2px solid #00f;"></canvas></div>
        <div class="controls">
            ← → Move | ↓ Soft Drop | ↑ Rotate | Space Hard Drop | P Pause
        </div>
        <button onclick="startGame()">New Game</button>
        <button onclick="togglePause()">Pause</button>
    </div>


    <script>
        const canvas = document.getElementById('game');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');
        
        const scale = 30;
        const cols = 10;
        const rows = 20;
        
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const linesElement = document.getElementById('lines');
        
        let board = [];
        let score = 0;
        let level = 1;
        let lines = 0;
        let dropTime = 0;
        let dropInterval = 1000;
        let gameOver = false;
        let paused = false;
        let current;
        let nextPiece;
        
        // ALL BLOCKS ARE NOW BLUE - Single color array
        const BLUE = '#00f'; // Pure blue for all blocks
        
        // Tetromino shapes (same shapes, all blue)
        const PIECES = [
            [[1,1,1,1]], // I
            [[1,1],[1,1]], // O
            [[0,1,0],[1,1,1]], // T
            [[0,1,1],[1,1,0]], // S
            [[1,1,0],[0,1,1]], // Z
            [[1,0,0],[1,1,1]], // J
            [[0,0,1],[1,1,1]]  // L
        ];
        
        function createBoard() {
            board = [];
            for (let r = 0; r < rows; r++) {
                board[r] = [];
                for (let c = 0; c < cols; c++) {
                    board[r][c] = 0;
                }
            }
        }
        
        function createPiece() {
            const typeId = Math.floor(Math.random() * PIECES.length);
            return {
                x: Math.floor(cols / 2) - 1,
                y: 0,
                matrix: PIECES[typeId],
                colorId: 1, // Always blue (1)
                rotation: 0
            };
        }
        
        function rotatePiece(matrix) {
            const n = matrix.length;
            let rotated = [];
            for (let i = 0; i < n; i++) {
                rotated[i] = [];
                for (let j = 0; j < n; j++) {
                    rotated[i][j] = matrix[n-1-j][i];
                }
            }
            return rotated;
        }
        
        function collide(piece, board) {
            for (let y = 0; y < piece.matrix.length; y++) {
                for (let x = 0; x < piece.matrix[y].length; x++) {
                    if (piece.matrix[y][x] !== 0) {
                        const newY = piece.y + y;
                        const newX = piece.x + x;
                        if (newY < 0 || newY >= rows || newX < 0 || newX >= cols || 
                            (newY >= 0 && board[newY][newX])) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }
        
        function merge(piece) {
            for (let y = 0; y < piece.matrix.length; y++) {
                for (let x = 0; x < piece.matrix[y].length; x++) {
                    if (piece.matrix[y][x]) {
                        const newY = piece.y + y;
                        const newX = piece.x + x;
                        if (newY >= 0) {
                            board[newY][newX] = 1; // Always blue (1)
                        }
                    }
                }
            }
        }
        
        function clearLines() {
            let linesCleared = 0;
            outer: for (let r = rows - 1; r >= 0; r--) {
                for (let c = 0; c < cols; c++) {
                    if (!board[r][c]) continue outer;
                }
                linesCleared++;
                board.splice(r, 1);
                board.unshift(new Array(cols).fill(0));
                r++;
            }
            if (linesCleared > 0) {
                lines += linesCleared;
                level = Math.floor(lines / 10) + 1;
                dropInterval = Math.max(50, 1000 - (level - 1) * 50);
                score += linesCleared * 100 * level;
                updateScore();
            }
        }
        
        function drawBlock(x, y, colorId) {
            context.fillStyle = BLUE; // ALL BLOCKS BLUE
            context.shadowColor = BLUE;
            context.shadowBlur = 15;
            context.fillRect(x * scale, y * scale, scale - 1, scale - 1);
            context.shadowBlur = 0;
            context.strokeStyle = '#333';
            context.lineWidth = 1;
            context.strokeRect(x * scale, y * scale, scale - 1, scale - 1);
        }
        
        function drawBoard() {
            // Red background already set in CSS
            context.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c]) {
                        drawBlock(c, r, 1); // Blue blocks only
                    }
                }
            }
        }
        
        function drawPiece(piece) {
            context.save();
            context.translate(piece.x * scale, piece.y * scale);
            piece.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value) {
                        drawBlock(x, y, 1); // Blue blocks only
                    }
                });
            });
            context.restore();
        }
        
        function drawNextPiece() {
            nextContext.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (nextPiece) {
                nextContext.save();
                nextContext.translate(20, 20);
                nextPiece.matrix.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value) {
                            nextContext.fillStyle = BLUE; // Blue preview
                            nextContext.shadowColor = BLUE;
                            nextContext.shadowBlur = 8;
                            nextContext.fillRect(x * 20, y * 20, 19, 19);
                            nextContext.shadowBlur = 0;
                        }
                    });
                });
                nextContext.restore();
            }
        }
        
        function updateScore() {
            scoreElement.textContent = score;
            levelElement.textContent = level;
            linesElement.textContent = lines;
        }
        
        function drop() {
            current.y++;
            if (collide(current, board)) {
                current.y--;
                merge(current);
                current = nextPiece;
                nextPiece = createPiece();
                clearLines();
                if (collide(current, board)) {
                    gameOver = true;
                    paused = true;
                }
            }
            dropTime = 0;
        }
        
        function move(dir) {
            current.x += dir;
            if (collide(current, board)) {
                current.x -= dir;
            }
        }
        
        function rotate() {
            const rotated = rotatePiece(current.matrix);
            current.matrix = rotated;
            if (collide(current, board)) {
                current.matrix = rotatePiece(rotated); // revert
            }
        }
        
        function hardDrop() {
            while (!collide(current, board)) {
                current.y++;
            }
            current.y--;
            drop();
        }
        
        function update(time = 0) {
            if (!paused && !gameOver) {
                dropTime += time - (dropTime || time);
                if (dropTime > dropInterval) {
                    drop();
                }
            }
            
            drawBoard();
            drawPiece(current);
            drawNextPiece();
            
            requestAnimationFrame(update);
        }
        
        function startGame() {
            createBoard();
            nextPiece = createPiece();
            current = createPiece();
            score = 0;
            lines = 0;
            level = 1;
            dropInterval = 1000;
            gameOver = false;
            paused = false;
            dropTime = 0;
            updateScore();
        }
        
        function togglePause() {
            if (!gameOver) {
                paused = !paused;
            }
        }
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (gameOver) return;
            
            switch(e.code) {
                case 'ArrowLeft':
                    e.preventDefault();
                    move(-1);
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    move(1);
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    drop();
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    rotate();
                    break;
                case 'Space':
                    e.preventDefault();
                    hardDrop();
                    break;
                case 'KeyP':
                    e.preventDefault();
                    togglePause();
                    break;
            }
        });
        
        // Start the game
        startGame();
        update();
    </script>
</body>
</html>
